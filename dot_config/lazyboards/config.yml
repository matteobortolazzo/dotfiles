provider: github
session_max_length: 40 # match agentwatch's 40-char window-name cap (join key)
action_refresh_delay: 5 # let the skill apply its label before the board re-reads
working_label: "Working" # spinner marker; card keeps its column while set

columns:
  - name: New
    cleanup: "tmux kill-window -t {session} 2>/dev/null || true"
    actions:
      R:
        {
          name: Refine,
          type: shell,
          command: "agentwatch run refine {number} -- {comment}",
        }

  - name: Refined
    cleanup: "tmux kill-window -t {session} 2>/dev/null || true"
    actions:
      D:
        { name: Design, type: shell, command: "agentwatch run design {number}" }
      I:
        {
          name: Implement,
          type: shell,
          command: "agentwatch run implement {number} -- {comment}",
        }

  - name: Planned
    cleanup: "tmux kill-window -t {session} 2>/dev/null || true"
    actions:
      I:
        {
          name: Implement,
          type: shell,
          command: "agentwatch run implement {number} -- {comment}",
        }

  - name: In Review

# Board-level actions (operate on the selected card / no card)
actions:
  A:
    {
      name: Annotate,
      type: shell,
      command: "gh issue comment {number} --body {comment}",
    }
  C: { name: Claude, type: shell, command: "tmux new-window agent-sand" }
  P: { name: Pull, type: shell, command: "git pull --rebase" }
