provider: github
session_max_length: 40 # match agentwatch's 40-char window-name cap (join key)
action_refresh_delay: 5 # let the skill apply its label before the board re-reads
working_label: "Working" # spinner marker; card keeps its column while set
agentwatch: true
cleanup: "agentwatch close {number}"

columns:
  - name: New
    actions:
      R:
        {
          name: Refine,
          type: shell,
          command: "cenci run refine {number} --model sonnet -- {comment}",
        }

  - name: Refined
    actions:
      D:
        {
          name: Design,
          type: shell,
          command: "cenci run design {number} --model sonnet --no-sandbox -- {comment}",
        }
      I:
        {
          name: Implement,
          type: shell,
          command: "cenci run implement {number} --model sonnet -- {comment}",
        }

  - name: Planned
    actions:
      I:
        {
          name: Implement,
          type: shell,
          command: "cenci run implement {number} --model sonnet -- {comment}",
        }

  - name: In Review

# Board-level actions (operate on the selected card / no card)
actions:
  C: { name: Claude, type: shell, command: "tmux new-window cn cs" }
